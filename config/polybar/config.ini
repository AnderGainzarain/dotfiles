# ██║░╚═╝░██║╚█████╔╝██████╔╝╚██████╔╝███████╗███████╗██████╔╝
# ╚═╝░░░░░╚═╝░╚════╝░╚═════╝░░╚═════╝░╚══════╝╚══════╝╚═════╝░

;include-file = ~/.config/polybar/modules.ini
[module/updates-pacman-aurhelper]
type = custom/script
exec = ~/.scripts/polybar/updates-pacman-aurhelper.sh
interval = 600

[module/NetworkManager]
type = custom/script
exec = ~/.scripts/polybar/rofi-wifi-menu.sh
interval = 600

[module/wlan2]
type = internal/network
interface = wlan0
interval = 1.0

format-connected = 直<label-connected>
label-connected = %{A1:wifimenu:} %essid%%{A}
label-connected-padding = 1

format-disconnected = <label-disconnected>
label-disconnected = %{A1:wifimenu:}%{A}

[module/powermenu]
type = custom/text
content = 襤
click-left = exec ~/.scripts/rofi/powermenu.sh


[module/headphones]
type = custom/script
click-left = exec ~/.scripts/polybar/headphones.sh
format = 

[module/soundbar]
type = custom/script
click-left = exec ~/.scripts/polybar/soundbar.sh
format = 蓼


[module/date]
type = internal/date
interval = 1

date = %d %B %Y|%H:%M
date-alt = %H:%M 

label = %date%

[module/battery]
type = internal/battery
interval = 5
; This is useful in case the battery never reports 100% charge
full-at = 100

; format-low once this charge percentage is reached
low-at = 5

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = ADP1

format-charging =  <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full =   <label-full>

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

ramp-capacity-0-foreground = ${colors.alert}
ramp-capacity-1-foreground = ${colors.primary}

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

use-ui-max = true

internal = 5

format-volume = <ramp-volume> <label-volume>

label-muted = 婢
label-muted-foreground = #666

ramp-volume-0 = 
ramp-volume-1 = 墳
ramp-volume-2 = 

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[settings]
screenchange-reload = true
pseudo-transparency = true