;include-file = ~/.config/polybar/colors.ini
[colors]
background = #292D3E
background-alt = #545765
foreground = #D0D0D0
primary = #c792ea
secondary = #82aaff
alert = #f07178
disabled = #707880

# ███╗░░░███╗░█████╗░██╗███╗░░██╗  ██████╗░░█████╗░██████╗░
